<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактировать</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body class="flex justify-center bg-gray-100">
    <div class="w-full max-w-md bg-white min-h-screen p-6 shadow-xl relative">
        <!-- Top Bar -->
        <div class="flex items-center justify-between mb-8">
            <a href="contacts.html" class="text-gray-400 text-2xl no-underline">←</a>
            <h1 class="text-lg font-bold">Редактировать</h1>
            <button class="bg-[#C229F6] text-white px-6 py-2 rounded-xl font-bold shadow-md">Сохранить</button>
        </div>

        <!-- Аватар -->
        <div class="flex justify-center mb-10">
            <!-- Убрали фоновый класс Tailwind из HTML, ставим его через JS -->
            <div id="avatar-div" class="w-32 h-32 rounded-full flex items-center justify-center text-white text-4xl font-bold shadow-xl relative">
                <span id="avatar-initials">?</span>
                <div class="absolute bottom-1 right-1 w-9 h-9 bg-[#C229F6] border-4 border-white rounded-full flex items-center justify-center text-white shadow-sm">📸</div>
            </div>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1 block mb-1">Имя *</label>
                <input id="name-field" class="w-full bg-[#F3F4F6] rounded-2xl p-4 outline-none border-none font-medium">
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1 block mb-1">Телефон *</label>
                <input id="phone-field" class="w-full bg-[#F3F4F6] rounded-2xl p-4 outline-none border-none font-medium">
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1 block mb-1">Email</label>
                <input id="email-field" class="w-full bg-[#F3F4F6] rounded-2xl p-4 outline-none border-none font-medium">
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1 block mb-1">Адрес</label>
                <input id="address-field" class="w-full bg-[#F3F4F6] rounded-2xl p-4 outline-none border-none font-medium">
            </div>

            <!-- Категории -->
            <div class="grid grid-cols-2 gap-3 mt-4">
                <label class="cursor-pointer"><input type="radio" name="cat" value="Семья" class="hidden cat-input"><div class="py-3 text-center rounded-xl border-2 font-bold text-xs cat-label-семья text-[#FF2D55] border-red-50">Семья</div></label>
                <label class="cursor-pointer"><input type="radio" name="cat" value="Друзья" class="hidden cat-input"><div class="py-3 text-center rounded-xl border-2 font-bold text-xs cat-label-друзья text-[#8E5AFA] border-purple-50">Друзья</div></label>
                <label class="cursor-pointer"><input type="radio" name="cat" value="Работа" class="hidden cat-input"><div class="py-3 text-center rounded-xl border-2 font-bold text-xs cat-label-работа text-[#00AEEF] border-blue-50">Работа</div></label>
                <label class="cursor-pointer"><input type="radio" name="cat" value="Другое" class="hidden cat-input"><div class="py-3 text-center rounded-xl border-2 font-bold text-xs cat-label-другое text-[#FF9500] border-orange-50">Другое</div></label>
            </div>
        </div>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        if (p.has('name')) {
            // Заполнение текстовых полей
            document.getElementById('name-field').value = p.get('name');
            document.getElementById('phone-field').value = p.get('phone');
            document.getElementById('email-field').value = p.get('email');
            document.getElementById('address-field').value = p.get('address');

            // Инициалы
            document.getElementById('avatar-initials').innerText = p.get('name').split(' ').map(n => n[0]).join('').toUpperCase();

            // ПРЯМАЯ УСТАНОВКА ЦВЕТА ФОНА (через Style)
            document.getElementById('avatar-div').style.backgroundColor = p.get('color');

            // Выбор категории
            const cat = p.get('cat');
            if(cat) document.querySelector(`input[value="${cat}"]`).checked = true;
        }
    </script>
</body>
</html>
