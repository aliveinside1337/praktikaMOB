<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body class="flex justify-center bg-gray-100">
    <div class="w-full max-w-md bg-white min-h-screen relative flex flex-col shadow-xl">
        <!-- Поле поиска -->
        <div class="px-6 pt-10">
            <h1 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">🔍 Поиск</h1>

            <div class="relative mb-8">
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">🔍</div>
                <input type="text" placeholder="Поиск по имени, телефону..."
                       class="w-full bg-[#F3F4F6] rounded-2xl py-4 pl-12 pr-6 outline-none border-none text-sm focus:ring-2 focus:ring-[#C229F6]/20 transition-all">
            </div>

            <!-- Фильтры -->
            <div class="flex gap-2 overflow-x-auto pb-4 scrollbar-hide mb-4">
                <button class="px-5 py-2 rounded-full text-sm font-bold bg-[#C229F6] text-white">Все</button>
                <button class="px-5 py-2 rounded-full text-sm font-bold bg-[#F3F4F6] text-gray-400">Семья</button>
                <button class="px-5 py-2 rounded-full text-sm font-bold bg-[#F3F4F6] text-gray-400">Друзья</button>
                <button class="px-5 py-2 rounded-full text-sm font-bold bg-[#F3F4F6] text-gray-400">Работа</button>
            </div>
        </div>

        <!-- Центральный блок (пустое состояние) -->
        <div class="flex-1 flex flex-col items-center justify-center text-center px-10 pb-40">
            <div class="w-32 h-32 bg-blue-50 rounded-full flex items-center justify-center text-blue-400 mb-6">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </div>
            <h3 class="font-bold text-gray-900 text-xl">Начните поиск</h3>
            <p class="text-gray-400 mt-2 text-sm leading-relaxed">Введите имя, телефон, email или адрес контакта</p>
            <div class="mt-4 inline-block px-3 py-1 bg-gray-100 rounded-full">
                <span class="text-[10px] font-bold text-gray-300 uppercase">Всего контактов: 3</span>
            </div>
        </div>

        <!-- Нижняя панель навигации -->
        <nav class="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-100 flex justify-around py-4 z-50 shadow-[0_-2px_10px_rgba(0,0,0,0.02)]">
            <a href="home.html" class="text-gray-300 flex flex-col items-center gap-1 no-underline font-bold text-[9px]">
                🏠 <span class="mt-1">Главная</span>
            </a>
            <a href="contacts.html" class="text-gray-300 flex flex-col items-center gap-1 no-underline font-bold text-[9px]">
                👥 <span class="mt-1">Контакты</span>
            </a>
            <a href="search.html" class="text-[#C229F6] flex flex-col items-center gap-1 no-underline font-bold text-[9px]">
                🔍 <span class="mt-1">Поиск</span>
            </a>
            <a href="categories.html" class="text-gray-300 flex flex-col items-center gap-1 no-underline font-bold text-[9px]">
                📦 <span class="mt-1">Категории</span>
            </a>
            <a href="data.html" class="text-gray-300 flex flex-col items-center gap-1 no-underline font-bold text-[9px]">
                ⚙️ <span class="mt-1">Данные</span>
            </a>
        </nav>
    </div>
</body>
</html>
