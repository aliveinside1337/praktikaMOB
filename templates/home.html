<section class="hero">
  <button class="settings" data-alert="Настройки ContactBook пока в разработке" aria-label="Настройки">⚙️</button>
  <p class="text-[17px] font-black opacity-95 mb-1">Добро пожаловать!</p>
  <h1 class="text-[30px] leading-none font-black tracking-[-0.03em]">ContactBook</h1>
  <p class="text-[13px] font-bold opacity-85 mt-2">Ваша личная адресная книга</p>
  <div class="grid-3 mt-6">
    <div class="stat-card"><div><div class="stat-icon">👥</div><div class="stat-num">{{STAT_TOTAL}}</div><div class="stat-label">Всего</div></div></div>
    <div class="stat-card"><div><div class="stat-icon">⭐</div><div class="stat-num">{{STAT_FAV}}</div><div class="stat-label">Избранные</div></div></div>
    <div class="stat-card"><div><div class="stat-icon">📁</div><div class="stat-num">{{STAT_CATS}}</div><div class="stat-label">Категорий</div></div></div>
  </div>
</section>

<section class="section">
  <h2 class="section-title">Быстрые действия</h2>
  <div class="grid-2">
    <button class="action-card" data-open-new style="background:linear-gradient(135deg,#d946ef,#c45af2)"><span class="icon">➕</span><span class="label">Добавить контакт</span></button>
    <button class="action-card" data-tab-go="contacts" style="background:linear-gradient(135deg,#13c4cf,#06a9bd)"><span class="icon">📇</span><span class="label">Все контакты</span></button>
    <button class="action-card" data-tab-go="categories" style="background:linear-gradient(135deg,#ff5a66,#fb4959)"><span class="icon">📁</span><span class="label">По категориям</span></button>
    <button class="action-card" data-tab-go="data" style="background:linear-gradient(135deg,#34d35f,#21b94d)"><span class="icon">📦</span><span class="label">Импорт/Экспорт</span></button>
  </div>
</section>

<section class="section">
  <h2 class="section-title">По категориям</h2>
  <div class="panel">{{PROGRESS_BARS}}</div>
</section>

<section class="section">
  <div class="flex items-center justify-between mb-3">
    <h2 class="section-title !m-0">⭐Избранные</h2>
    <button class="text-[#c026d3] font-black min-h-[44px] px-2" data-tab-go="categories">Все</button>
  </div>
  <div class="favorite-scroll">{{FAVORITES_LIST}}</div>
</section>
