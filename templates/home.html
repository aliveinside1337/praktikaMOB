<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <div class="phone-screen">
        <div class="settings-header">
            <a href="contacts.html" class="nav-btn" style="color: var(--text-main); background: #f1f2f6;"><i class="fas fa-arrow-left"></i></a>
            <h1>Настройки</h1>
        </div>

        <div class="settings-content">
            <div class="user-profile-card">
                <div class="avatar-circle">ИИ</div>
                <div class="user-info">
                    <h3>ИВАН ИВАНОВ</h3>
                    <p><i class="fab fa-instagram"></i> @ivan_dev • +7 (999) 123-45-67</p>
                </div>
                <div class="chevron"><i class="fas fa-chevron-right"></i></div>
            </div>

            <div class="section-title">УПРАВЛЕНИЕ КОНТАКТАМИ</div>
            <div class="settings-list">
                <div class="settings-item">
                    <div class="item-icon"><i class="fas fa-file-alt"></i></div>
                    <div class="item-text">
                        <h4>Поиск дубликатов</h4>
                        <p>Найдено 3 совпадения</p>
                    </div>
                    <div class="chevron"><i class="fas fa-chevron-right"></i></div>
                </div>
            </div>

            <div class="section-title">КОНФИДЕНЦИАЛЬНОСТЬ И БЕЗОПАСНОСТЬ</div>
            <div class="settings-list">
                <div class="settings-item">
                    <div class="item-icon"><i class="fas fa-user-minus"></i></div>
                    <div class="item-text">
                        <h4>Заблокированные</h4>
                        <p>управление черным списком</p>
                    </div>
                    <div class="chevron"><i class="fas fa-chevron-right"></i></div>
                </div>
            </div>

            <div class="section-title">УВЕДОМЛЕНИЯ</div>
            <div class="settings-list">
                <div class="settings-item">
                    <div class="item-icon"><i class="fas fa-bell"></i></div>
                    <div class="item-text">
                        <h4>Системные уведомления</h4>
                    </div>
                    <div class="toggle-container">
                        <label class="switch">
                            <input type="checkbox" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="section-title">ОСНОВНОЕ</div>
            <div class="settings-list">
                <a href="categories.html" style="text-decoration: none;">
                    <div class="settings-item">
                        <div class="item-icon"><i class="fas fa-tags"></i></div>
                        <div class="item-text">
                            <h4>Категории</h4>
                        </div>
                        <div class="chevron"><i class="fas fa-chevron-right"></i></div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
