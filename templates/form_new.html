<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Новый контакт</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body class="flex justify-center bg-gray-100">
    <div class="w-full max-w-md bg-white min-h-screen p-6 shadow-xl relative">
        <!-- Top Bar -->
        <div class="flex items-center justify-between mb-8">
            <a href="contacts.html" class="text-gray-400 text-2xl no-underline">←</a>
            <h1 class="text-lg font-bold text-gray-800">Новый контакт</h1>
            <button class="bg-[#C229F6] text-white px-6 py-2 rounded-xl font-bold shadow-md active:scale-95 transition-all">Сохранить</button>
        </div>

        <!-- Аватар -->
        <div class="flex justify-center mb-10">
            <div class="w-32 h-32 rounded-full bg-blue-50 flex items-center justify-center text-blue-400 text-5xl font-bold shadow-inner relative">
                ?
                <div class="absolute bottom-1 right-1 w-9 h-9 bg-[#C229F6] border-4 border-white rounded-full flex items-center justify-center text-white">📸</div>
            </div>
        </div>

        <!-- Поля ввода -->
        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Имя *</label>
                <input placeholder="Иван Иванов" class="w-full bg-[#F3F4F6] rounded-2xl p-4 outline-none border-none font-medium">
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">📞 Телефон *</label>
                <input placeholder="+7 (999) 000-00-00" class="w-full bg-[#F3F4F6] rounded-2xl p-4 outline-none border-none font-medium">
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">✉️ Email</label>
                <input placeholder="example@mail.ru" class="w-full bg-[#F3F4F6] rounded-2xl p-4 outline-none border-none font-medium">
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">📍 Адрес</label>
                <input placeholder="Город, улица, дом..." class="w-full bg-[#F3F4F6] rounded-2xl p-4 outline-none border-none font-medium">
            </div>

            <!-- КАТЕГОРИИ -->
            <div class="grid grid-cols-2 gap-3 mt-4">
                <label class="cursor-pointer">
                    <input type="radio" name="cat" value="Семья" class="hidden cat-input">
                    <div class="py-3 text-center rounded-xl border-2 font-bold text-xs cat-label-семья text-[#FF2D55] border-red-50">Семья</div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="cat" value="Друзья" class="hidden cat-input">
                    <div class="py-3 text-center rounded-xl border-2 font-bold text-xs cat-label-друзья text-[#8E5AFA] border-purple-50">Друзья</div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="cat" value="Работа" class="hidden cat-input" checked>
                    <div class="py-3 text-center rounded-xl border-2 font-bold text-xs cat-label-работа text-[#00AEEF] border-blue-50">Работа</div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="cat" value="Другое" class="hidden cat-input">
                    <div class="py-3 text-center rounded-xl border-2 font-bold text-xs cat-label-другое text-[#FF9500] border-orange-50">Другое</div>
                </label>
            </div>

            <!-- ИЗБРАННОЕ (SWITCH) -->
            <label class="flex items-center justify-between p-4 bg-gray-50 rounded-[28px] border border-gray-100 mt-6 cursor-pointer">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white rounded-full shadow-sm flex items-center justify-center text-yellow-400">⭐</div>
                    <div class="font-bold text-sm">Избранное</div>
                </div>
                <div class="relative">
                    <input type="checkbox" class="hidden switch-input">
                    <div class="w-12 h-7 switch-bg rounded-full p-1 transition-all">
                        <div class="w-5 h-5 bg-white rounded-full shadow-sm transition-all switch-dot"></div>
                    </div>
                </div>
            </label>
        </div>
    </div>
</body>
</html>
