<form id="contactForm" data-mode="new">
  <h2 class="form-title">Новый контакт</h2>
  <p class="form-subtitle">Заполните имя, телефон и выберите категорию.</p>
  {{FORM_FIELDS}}
  <div class="btn-row">
    <button class="secondary-btn" type="button" data-close-modal>Отмена</button>
    <button class="primary-btn" type="submit">Сохранить</button>
  </div>
</form>
