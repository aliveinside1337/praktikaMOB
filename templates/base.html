<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> .scrollbar-hide::-webkit-scrollbar { display: none; } </style>
</head>
<body class="bg-gray-100 flex justify-center min-h-screen">
    <div class="w-full max-w-md bg-white shadow-2xl relative min-h-screen flex flex-col">
        <main class="flex-1 overflow-y-auto">
            {% block content %}{% endblock %}
        </main>

        {% set path = request.url.path %}
        {% if path != '/add' and '/edit/' not in path %}
        <nav class="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-100 flex justify-around py-4 z-[999]">
            <a href="/home" class="flex flex-col items-center gap-1 {{ 'text-[#C229F6]' if active_tab == 'home' else 'text-gray-300' }}">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                <span class="text-[10px] font-bold">Главная</span>
            </a>
            <a href="/" class="flex flex-col items-center gap-1 {{ 'text-[#C229F6]' if active_tab == 'contacts' else 'text-gray-300' }}">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                <span class="text-[10px] font-bold">Контакты</span>
            </a>
            <a href="/search" class="flex flex-col items-center gap-1 {{ 'text-[#C229F6]' if active_tab == 'search' else 'text-gray-300' }}">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <span class="text-[10px] font-bold">Поиск</span>
            </a>
            <a href="/categories" class="flex flex-col items-center gap-1 {{ 'text-[#C229F6]' if active_tab == 'categories' else 'text-gray-300' }}">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4"/></svg>
                <span class="text-[10px] font-bold">Категории</span>
            </a>
            <a href="/data" class="flex flex-col items-center gap-1 {{ 'text-[#C229F6]' if active_tab == 'data' else 'text-gray-300' }}">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82"/></svg>
                <span class="text-[10px] font-bold">Данные</span>
            </a>
        </nav>
        {% endif %}
    </div>
</body>
</html>
